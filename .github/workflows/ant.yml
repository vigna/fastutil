name: Java CI

on:
  push:
  pull_request:
    branches: ["master"]
  workflow_dispatch:

concurrency:
  group: java-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  checks: write
  pull-requests: write
  contents: read
  packages: write

jobs:
  build:
    name: Java CI Build
    runs-on: ubuntu-latest

    env:
      GITHUB_ACTOR: ${{ github.actor }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      MAVEN_GROUP_ID: ${{ secrets.MAVEN_GROUP_ID }}
      MAVEN_SNAPSHOTS_REPOSITORY_ID: ${{ secrets.MAVEN_SNAPSHOTS_REPOSITORY_ID }}
      MAVEN_SNAPSHOTS_REPOSITORY_URL: ${{ secrets.MAVEN_SNAPSHOTS_REPOSITORY_URL }}

    steps:
      - name: Checkout git
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'
          server-id: github
          # setup-java expects environment variable names here, not ${{ }} expressions.
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Compute deployment version
        shell: bash
        run: |
          BASE_VERSION="$(grep '^version=' build.properties | cut -d'=' -f2)"

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            DEPLOY_VERSION="${BASE_VERSION}-pr-${{ github.event.pull_request.number }}-SNAPSHOT"
          elif [[ "${GITHUB_REF_NAME}" == "master" ]]; then
            DEPLOY_VERSION="${BASE_VERSION}-SNAPSHOT"
          else
            SAFE_REF="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._/-]#-#g; s#/#-#g')"
            DEPLOY_VERSION="${BASE_VERSION}-${SAFE_REF}-SNAPSHOT"
          fi

          echo "PROJECT_VERSION=${DEPLOY_VERSION}" >> "$GITHUB_ENV"
          echo "Using PROJECT_VERSION=${DEPLOY_VERSION}"

      - name: Pull Java sources
        run: make sources

      - name: Run tests with Ant
        run: ant junit -Dversion=${PROJECT_VERSION} -noinput -buildfile build.xml

      - name: Split JARs
        run: ./split.sh

      - name: Build all distributions with Ant
        run: ant dist-all -Dversion=${PROJECT_VERSION} -noinput -buildfile build.xml
      
      - name: Generate all pom.xml files with Ant
        run: ant pom-all -Dversion=${PROJECT_VERSION} -noinput -buildfile build.xml

      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always()
        with:
          report_paths: '**/reports/TEST-*.xml'
          comment: true

      - name: Deploy snapshot main package
        run: >
          mvn --batch-mode deploy:deploy-file
          -Durl=${MAVEN_SNAPSHOTS_REPOSITORY_URL}
          -DrepositoryId=${MAVEN_SNAPSHOTS_REPOSITORY_ID}
          -Dfile=dist/lib/fastutil-${PROJECT_VERSION}.jar
          -DpomFile=pom.xml
          -Dsources=dist/lib/fastutil-${PROJECT_VERSION}-sources.jar
          -Djavadoc=dist/lib/fastutil-${PROJECT_VERSION}-javadoc.jar

      - name: Deploy snapshot core package
        run: >
          mvn --batch-mode deploy:deploy-file
          -Durl=${MAVEN_SNAPSHOTS_REPOSITORY_URL}
          -DrepositoryId=${MAVEN_SNAPSHOTS_REPOSITORY_ID}
          -Dfile=dist/lib/fastutil-core-${PROJECT_VERSION}.jar
          -DpomFile=pom-core.xml
          -Dsources=dist/lib/fastutil-core-${PROJECT_VERSION}-sources.jar
          -Djavadoc=dist/lib/fastutil-core-${PROJECT_VERSION}-javadoc.jar

      - name: Upload JAR Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastutil-jar-artifacts
          path: |
            dist/lib/*.jar
            pom.xml
            pom-core.xml
            LICENSE
            NOTICE
            licenses/**

      - name: Upload Documentation Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fastutil-docs-artifacts
          path: |
            ./docs/
            ./docs-core/

      - name: Upload Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-test-results
          path: '**/reports/TEST-*.xml'
          retention-days: 14
